name: Android / Kotlin Bootstrap

on:
  push:
    branches: [ main, "codex/**" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Clean
        run: ./gradlew clean

      - name: Assemble debug bootstrap
        run: ./gradlew assembleDebug

      - name: Run tests
        run: ./gradlew test
