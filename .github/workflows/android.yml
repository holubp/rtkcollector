name: Android / Kotlin Bootstrap

on:
  push:
    branches: [ main, "codex/**" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Clean
        run: sh gradlew clean

      - name: Test Android test-compilation gate
        run: python3 -m unittest discover -s tools -p 'test_check_android_test_compilation.py' -v

      - name: Compile Android test source sets
        run: python3 tools/check_android_test_compilation.py --mode standard

      - name: Assemble debug bootstrap
        run: sh gradlew assembleDebug

      - name: Run tests
        run: sh gradlew test --no-parallel
